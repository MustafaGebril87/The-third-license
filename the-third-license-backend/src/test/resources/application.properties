# Test environment — uses in-memory values so tests don't need real env vars
spring.datasource.url=jdbc:postgresql://localhost:5432/the_third_license_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.id.new_generator_mappings=true

# Fixed test secret — never use this outside of tests
security.jwt.secret=VGVzdFNlY3JldEZvclVuaXRUZXN0c09ubHkxMjM0NTY=
security.jwt.expiration-ms=900000
security.jwt.refresh-expiration-ms=604800000

logging.level.root=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

app.currency-exchange-rate=1.25
stripe.secret.key=sk_test_PLACEHOLDER_FOR_TESTS
