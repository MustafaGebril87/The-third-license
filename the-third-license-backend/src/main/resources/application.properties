# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/the_third_license_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.id.new_generator_mappings=true

# ── JWT (set these as environment variables — never commit real values) ────────
# Generate a strong secret: openssl rand -base64 32
security.jwt.secret=${JWT_SECRET}
# Access token: 15 minutes
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
# Refresh token: 7 days
security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ── Logging (use WARN in production; set LOG_LEVEL=DEBUG locally if needed) ───
logging.level.root=${LOG_LEVEL:WARN}
logging.level.org.springframework.web=${LOG_LEVEL:WARN}
logging.level.org.springframework.security=${LOG_LEVEL:WARN}

# ── App settings ──────────────────────────────────────────────────────────────
app.currency-exchange-rate=1.25

# ── Stripe ────────────────────────────────────────────────────────────────────
stripe.secret.key=${STRIPE_SECRET_KEY}
